<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sælg din bolig kontant — 365 Ejendomme</title>
<meta name="description" content="Få et foreløbigt kontant tilbud på din ejerlejlighed på 5 minutter. 87+ boliger købt siden 2024. Ingen mæglersalær." />
<meta property="og:title" content="Sælg din bolig kontant — 365 Ejendomme" />
<meta property="og:description" content="Foreløbigt kontant tilbud på 5 minutter. Ingen forpligtelse." />
<meta property="og:image" content="https://crm.365ejendom.dk/salg-photos/hero/danish-apartment-1.png" />
<meta property="og:url" content="https://crm.365ejendom.dk/salg" />
<style>
  /*
   * Standalone "shell" der embedder /salg?embed=1 via iframe.
   * Iframe'en sender postMessage med height-updates saa wrapperen
   * vokser/krymper med content. Resultat: indlejret SPA der opfoerer
   * sig som en normal side, ingen scrollbar i iframe.
   */
  html, body {
    margin: 0;
    padding: 0;
    background: #fff;
    -webkit-font-smoothing: antialiased;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
  }
  #salg-frame-wrapper {
    width: 100%;
    position: relative;
    min-height: 100vh;
    transition: min-height 0.2s ease;
  }
  #salg-frame {
    width: 100%;
    border: 0;
    display: block;
    min-height: 100vh;
  }
  #salg-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #F5EFE6;
    z-index: 1;
    transition: opacity 0.3s ease;
  }
  #salg-loading.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(36, 73, 73, 0.2);
    border-top-color: #244949;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  noscript {
    display: block;
    padding: 40px;
    text-align: center;
    font-size: 16px;
    color: #244949;
  }
</style>
</head>
<body>

<noscript>
  Denne side kræver JavaScript. Besøg <a href="https://crm.365ejendom.dk/salg">crm.365ejendom.dk/salg</a> direkte.
</noscript>

<div id="salg-frame-wrapper">
  <div id="salg-loading" aria-label="Indlæser boligberegner">
    <div class="spinner" role="status" aria-hidden="true"></div>
  </div>
  <iframe
    id="salg-frame"
    src="https://crm.365ejendom.dk/salg?embed=1"
    title="365 Ejendomme boligberegner"
    loading="lazy"
    allow="clipboard-write"
    referrerpolicy="strict-origin-when-cross-origin"
  ></iframe>
</div>

<script>
(function () {
  /*
   * Auto-resize listener: /salg?embed=1 sender 'height'-updates via
   * postMessage. Vi opdaterer iframe + wrapper height saa der ikke er
   * scrollbar inde i iframen.
   */
  const ALLOWED_ORIGIN = 'https://crm.365ejendom.dk';
  const frame = document.getElementById('salg-frame');
  const wrapper = document.getElementById('salg-frame-wrapper');
  const loading = document.getElementById('salg-loading');

  function setHeight(h) {
    if (!h || h < 100) return;
    // Lille buffer saa sticky-elementer ikke skaerer
    const safe = h + 8;
    frame.style.height = safe + 'px';
    wrapper.style.minHeight = safe + 'px';
  }

  window.addEventListener('message', function (e) {
    // Sikkerhed: kun beskeder fra crm.365ejendom.dk
    if (e.origin !== ALLOWED_ORIGIN) return;
    if (!e.data || typeof e.data !== 'object') return;

    if (e.data.type === '365-salg-ready') {
      loading.classList.add('hidden');
    } else if (e.data.type === '365-salg-resize') {
      setHeight(e.data.height);
      loading.classList.add('hidden');
    }
  });

  // Skjul loading senest efter 5s selv hvis vi ikke har faaet ready-event
  setTimeout(function () {
    loading.classList.add('hidden');
  }, 5000);

  // Hash-bridging: hvis bruger lander paa #step-2 etc., propag til iframe
  if (window.location.hash) {
    const baseSrc = frame.src;
    frame.src = baseSrc + window.location.hash;
  }
})();
</script>

</body>
</html>
