name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Next.js build
        run: npm run build
        env:
          # Build skal kunne gennemføres uden ægte DB — koden falder tilbage på warnings.
          DATABASE_URL: ''
          NEXT_PUBLIC_APP_URL: 'https://crm.example.com'
